services:
  estoque-api:
    build: ./estoque-api
    container_name: estoque-api
    ports:
      - "8080:8080"
    environment:
      - "SPRING_PROFILES_ACTIVE=default"
  
  estoque-ui:
    build: ./estoque-ui
    container_name: estoque-ui
    ports:
      - "5173:5173"
    depends_on:
      - estoque-api